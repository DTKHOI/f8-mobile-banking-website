<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CeloBank</title>

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/png"
            href="/assets/favicon/favicon-96x96.png"
            sizes="96x96"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/assets/favicon/favicon.svg"
        />
        <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/favicon/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="CeloBank" />
        <link rel="manifest" href="/assets/favicon/site.webmanifest" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />

        <!-- Reset -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <link rel="stylesheet" href="./assets/css/styles.css" />

        <header class="header">
            <div class="content">
                <div class="header__top">
                    <div class="header__box">
                        <img
                            src="./assets/img/Logo.svg"

                            class="logo"
                        />
                        <nav class="navbar">
                            <ul class="navbar__list">
                                <li>
                                    <a
                                        href="#!"
                                        class="navbar__link navbar__link--active"
                                        >Home</a
                                    >
                                </li>
                                <li>
                                    <a href="#!" class="navbar__link"
                                        >Products</a
                                    >
                                </li>
                                <li>
                                    <a href="#!" class="navbar__link"
                                        >Features</a
                                    >
                                </li>
                                <li>
                                    <a href="#!" class="navbar__link">Blog</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                    <div class="actions">
                        <a href="#!" class="log-in">Log in</a>
                        <a href="#!" class="btn sign-up">Sign up</a>
                    </div>
                </div>
            </div>

    <script src="./assets/animation/aos.js"></script>
    <script>
        AOS.init({
            once: false,
        });
